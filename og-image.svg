<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0f2140"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle radial glow top-right -->
  <circle cx="1050" cy="120" r="320" fill="rgba(37,99,235,0.07)"/>
  <!-- Subtle radial glow bottom-left -->
  <circle cx="150" cy="520" r="200" fill="rgba(16,185,129,0.05)"/>

  <!-- Logo mark -->
  <g transform="translate(80, 80)">
    <polygon points="0,0 60,0 54,14 6,14" fill="#2563eb" opacity="0.9"/>
    <polygon points="7,17 53,17 47,31 13,31" fill="#3b82f6" opacity="0.75"/>
    <polygon points="14,34 46,34 40,48 20,48" fill="#60a5fa" opacity="0.6"/>
    <polygon points="21,51 39,51 30,62" fill="#93c5fd" opacity="0.5"/>
  </g>

  <!-- Brand name -->
  <text x="152" y="122" font-family="Georgia, serif" font-size="28" font-weight="400" fill="#f1f5f9" letter-spacing="1">Sourcing Sense</text>

  <!-- Accent line -->
  <rect x="80" y="165" width="56" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Main headline -->
  <text x="80" y="260" font-family="Georgia, serif" font-size="64" font-weight="400" fill="#f1f5f9" letter-spacing="-1">AI Procurement</text>
  <text x="80" y="340" font-family="Georgia, serif" font-size="64" font-weight="400" fill="#f1f5f9" letter-spacing="-1">Automation</text>

  <!-- Subline -->
  <text x="80" y="410" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="26" fill="#94a3b8" letter-spacing="0.3">Free tools. Practical articles. Real results.</text>

  <!-- Stats row -->
  <g transform="translate(80, 470)">
    <!-- Stat 1 -->
    <rect x="0" y="0" width="210" height="72" rx="8" fill="rgba(37,99,235,0.12)" stroke="rgba(37,99,235,0.25)" stroke-width="1"/>
    <text x="20" y="28" font-family="Georgia, serif" font-size="28" fill="#60a5fa">95%</text>
    <text x="20" y="52" font-family="-apple-system, sans-serif" font-size="13" fill="#64748b">time saved · supplier class.</text>

    <!-- Stat 2 -->
    <rect x="228" y="0" width="210" height="72" rx="8" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
    <text x="248" y="28" font-family="Georgia, serif" font-size="28" fill="#34d399">80%</text>
    <text x="248" y="52" font-family="-apple-system, sans-serif" font-size="13" fill="#64748b">time saved · contract review</text>

    <!-- Stat 3 -->
    <rect x="456" y="0" width="240" height="72" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="476" y="28" font-family="Georgia, serif" font-size="28" fill="#93c5fd">8+ years</text>
    <text x="476" y="52" font-family="-apple-system, sans-serif" font-size="13" fill="#64748b">EMEA procurement · LSS GB</text>
  </g>

  <!-- Right side decorative grid -->
  <g opacity="0.06">
    <line x1="820" y1="180" x2="820" y2="580" stroke="#60a5fa" stroke-width="1"/>
    <line x1="900" y1="180" x2="900" y2="580" stroke="#60a5fa" stroke-width="1"/>
    <line x1="980" y1="180" x2="980" y2="580" stroke="#60a5fa" stroke-width="1"/>
    <line x1="1060" y1="180" x2="1060" y2="580" stroke="#60a5fa" stroke-width="1"/>
    <line x1="1140" y1="180" x2="1140" y2="580" stroke="#60a5fa" stroke-width="1"/>
    <line x1="820" y1="220" x2="1180" y2="220" stroke="#60a5fa" stroke-width="1"/>
    <line x1="820" y1="300" x2="1180" y2="300" stroke="#60a5fa" stroke-width="1"/>
    <line x1="820" y1="380" x2="1180" y2="380" stroke="#60a5fa" stroke-width="1"/>
    <line x1="820" y1="460" x2="1180" y2="460" stroke="#60a5fa" stroke-width="1"/>
    <line x1="820" y1="540" x2="1180" y2="540" stroke="#60a5fa" stroke-width="1"/>
  </g>

  <!-- URL -->
  <text x="80" y="590" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" fill="#475569" letter-spacing="0.5">sourcing-sense.com</text>
</svg>
